name: edu_saas
description: Multi-tenant EDU-SaaS platform (mobile + web) using Flutter
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0+1
  retrofit: ^4.1.0
  json_annotation: ^4.9.0

  # DI
  get_it: ^7.7.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Realtime & notifications
  socket_io_client: ^2.0.3+1
  firebase_messaging: ^14.9.2

  # Payments (placeholders; wire up in later phases)
  flutterwave_standard: ^1.0.8
  mpesa_flutter_plugin: ^2.0.1

  # UI helpers (optional basics)
  intl: ^0.19.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
